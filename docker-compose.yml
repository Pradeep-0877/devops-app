version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: automation_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-changeme}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-automation_platform}
    volumes:
      - mongodb_data:/data/db
    networks:
      - automation_network

  # Redis for Celery
  redis:
    image: redis:7-alpine
    container_name: automation_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - automation_network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: automation_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_TYPE=mongodb
      - MONGODB_URL=mongodb://${MONGO_USERNAME:-admin}:${MONGO_PASSWORD:-changeme}@mongodb:27017
      - MONGODB_DB_NAME=${MONGO_DB:-automation_platform}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SECRET_KEY=${SECRET_KEY:?Set SECRET_KEY in .env}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?Set JWT_SECRET_KEY in .env}
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./backend:/app
      - ./logs:/app/logs
    networks:
      - automation_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Celery Worker
  celery_worker:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: automation_celery_worker
    restart: unless-stopped
    environment:
      - DATABASE_TYPE=mongodb
      - MONGODB_URL=mongodb://${MONGO_USERNAME:-admin}:${MONGO_PASSWORD:-changeme}@mongodb:27017
      - MONGODB_DB_NAME=${MONGO_DB:-automation_platform}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./backend:/app
    networks:
      - automation_network
    command: celery -A app.services.automation_engine.celery_app worker --loglevel=info

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: automation_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - automation_network
    command: npm run dev -- --host

volumes:
  mongodb_data:
  redis_data:

networks:
  automation_network:
    driver: bridge
